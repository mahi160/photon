<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>mpv-spike</title>
    <style>
      html,
      body {
        background: transparent;
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, sans-serif;
      }
      #bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.45);
        color: white;
        backdrop-filter: blur(4px);
      }
      button {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <strong>Photon mpv spike</strong>
      <button id="pause">Play/Pause</button>
      <button id="back">« 10s</button>
      <button id="fwd">10s »</button>
      <span>bar is translucent HTML on top of mpv's composited GL surface</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

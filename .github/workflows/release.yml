name: Release

# ponytail: no manual `git tag` step — push to `prod` and electron-builder
# tags/creates the GitHub release itself from package.json's version.
on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # ponytail: electron-builder creates the GitHub release on first publish;
      # running platforms in parallel races and creates duplicate draft releases.
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            builderArgs: --win
          - os: macos-latest
            builderArgs: --mac --arm64
          - os: ubuntu-latest
            builderArgs: --linux flatpak
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install flatpak-builder
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - run: pnpm build

      - run: pnpm exec electron-builder ${{ matrix.builderArgs }} --publish always

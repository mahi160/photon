name: Release

# semantic-release computes the version from conventional commits and tags/
# releases (as a draft) on every push to prod — normally a PR merge. The
# platform builds below only run once a release actually happens, and
# undraft it only after all three succeed (never publish a release with
# missing binaries).
on:
  push:
    branches: [prod]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      tag: v${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # TODO(#11): platform builds + publish. The Electron/electron-builder path
  # this used to run (pnpm build && electron-builder --publish, then
  # undraft once all three succeeded) is gone (ADR-0003 onward: Tauri +
  # in-process libmpv is the shell now) — the Tauri bundler/signing/updater
  # replacement isn't wired up yet. Until then, semantic-release above still
  # versions/tags/changelogs releases, but leaves them as drafts — the
  # previous auto-undraft-once-builds-succeed step is intentionally removed
  # rather than made to undraft a release with no binaries attached.
  publish-release:
    if: false # re-enable once #11 lands real platform builds
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release.outputs.tag }}" --repo "${{ github.repository }}" --draft=false

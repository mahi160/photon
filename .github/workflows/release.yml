name: Release

# ponytail: no manual `git tag` step — push to `prod` and this workflow
# tags + releases from package.json's version.
on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1 && exit 0
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$tag" \
            --draft --notes ""

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            builderArgs: --win
          - os: macos-latest
            builderArgs: --mac --arm64
          - os: ubuntu-latest
            builderArgs: --linux
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install rpmbuild
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - run: pnpm build
      - run: pnpm exec electron-builder ${{ matrix.builderArgs }} --publish always

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --repo "${{ github.repository }}" --draft=false
